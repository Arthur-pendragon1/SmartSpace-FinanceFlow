<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinanceFlow Dashboard</title>
    <style>
      :root {
        --bg: #050816;
        --panel: #0d1427;
        --panel-2: #121b33;
        --text: #f5f7ff;
        --muted: #8ea0c8;
        --accent: #2dd4bf;
        --accent-2: #60a5fa;
        --danger: #fb7185;
        --border: rgba(255, 255, 255, 0.08);
        --shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, var(--bg), #0b1224);
        color: var(--text);
        min-height: 100vh;
      }

      button, input, select { font: inherit; }

      .container {
        width: min(1200px, calc(100% - 2rem));
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.2rem 0;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        font-weight: 700;
        font-size: 1.1rem;
      }

      .brand-mark {
        width: 2.6rem;
        height: 2.6rem;
        display: grid;
        place-items: center;
        border-radius: 0.9rem;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: white;
        box-shadow: inset 0 1px 1px rgba(255,255,255,0.25);
      }

      .btn {
        border: 0;
        border-radius: 999px;
        padding: 0.8rem 1rem;
        cursor: pointer;
        transition: transform 0.2s ease, opacity 0.2s ease;
      }

      .btn:hover { transform: translateY(-2px); }

      .btn-primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: white;
      }

      .dashboard-grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: 1.2fr 0.8fr;
        padding-bottom: 2rem;
      }

      .panel {
        background: rgba(13, 20, 39, 0.95);
        border: 1px solid var(--border);
        border-radius: 1.25rem;
        padding: 1.2rem;
        box-shadow: var(--shadow);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .stat-card {
        background: linear-gradient(135deg, rgba(45, 212, 191, 0.14), rgba(96, 165, 250, 0.08));
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 1rem;
      }

      .stat-title {
        font-size: 0.9rem;
        color: var(--muted);
        margin-bottom: 0.35rem;
      }

      .stat-value {
        font-size: 1.35rem;
        font-weight: 700;
      }

      .crypto-card {
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 1rem;
        background: var(--panel-2);
      }

      .crypto-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.8rem;
        margin-top: 1rem;
      }

      .trend-up { color: #34d399; }
      .trend-down { color: var(--danger); }

      .chart-box {
        margin-top: 1rem;
        padding: 1rem;
        border-radius: 1rem;
        background: linear-gradient(180deg, rgba(45,212,191,0.08), rgba(96,165,250,0.04));
        border: 1px solid var(--border);
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        margin-bottom: 0.8rem;
        flex-wrap: wrap;
      }

      .search-box {
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
      }

      .search-box input,
      .search-box select,
      .modal-body input,
      .modal-body select {
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 0.8rem;
        color: var(--text);
        padding: 0.75rem 0.85rem;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th, td {
        text-align: left;
        padding: 0.8rem 0.6rem;
        border-bottom: 1px solid var(--border);
      }

      th { color: var(--muted); font-weight: 600; }

      .tag {
        display: inline-block;
        padding: 0.3rem 0.6rem;
        border-radius: 999px;
        font-size: 0.8rem;
      }

      .tag.expense { background: rgba(251,113,133,0.16); color: #fda4af; }
      .tag.income { background: rgba(52,211,153,0.16); color: #6ee7b7; }

      .delete-btn {
        border: 0;
        background: rgba(251,113,133,0.16);
        color: #fda4af;
        border-radius: 999px;
        padding: 0.4rem 0.7rem;
        cursor: pointer;
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(3, 8, 20, 0.72);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        z-index: 20;
      }

      .modal-overlay.active { display: flex; }

      .modal {
        width: min(480px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 1.25rem;
        padding: 1.2rem;
        box-shadow: var(--shadow);
      }

      .modal h3 { margin-top: 0; }

      .modal-body { display: grid; gap: 0.8rem; }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.7rem;
        margin-top: 0.3rem;
      }

      .muted { color: var(--muted); }

      .empty-state {
        text-align: center;
        color: var(--muted);
        padding: 1rem 0;
      }

      @media (max-width: 900px) {
        .dashboard-grid { grid-template-columns: 1fr; }
        .stats-grid, .crypto-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">F</span>
          <span>FinanceFlow</span>
        </div>
        <button class="btn btn-primary" id="openModal">Tambah Transaksi</button>
      </header>

      <main class="dashboard-grid">
        <section>
          <div class="stats-grid">
            <article class="stat-card">
              <div class="stat-title">Total Saldo</div>
              <div class="stat-value" id="balanceValue">Rp 0</div>
            </article>
            <article class="stat-card">
              <div class="stat-title">Pemasukan Bulan Ini</div>
              <div class="stat-value" id="incomeValue">Rp 0</div>
            </article>
            <article class="stat-card">
              <div class="stat-title">Pengeluaran Bulan Ini</div>
              <div class="stat-value" id="expenseValue">Rp 0</div>
            </article>
          </div>

          <div class="panel">
            <h3 style="margin-top: 0;">Portofolio Crypto</h3>
            <div class="crypto-grid">
              <article class="crypto-card">
                <div>BTC</div>
                <strong>$68,420</strong>
                <div class="trend-up">▲ +5.4%</div>
              </article>
              <article class="crypto-card">
                <div>ETH</div>
                <strong>$3,720</strong>
                <div class="trend-up">▲ +2.1%</div>
              </article>
              <article class="crypto-card">
                <div>AVAX</div>
                <strong>$41.20</strong>
                <div class="trend-down">▼ -2.1%</div>
              </article>
            </div>
            <div class="chart-box">
              <svg viewBox="0 0 320 120" width="100%" height="140" aria-label="Grafik portofolio crypto">
                <path d="M0 95 C30 85, 50 80, 80 70 S130 60, 160 50 S220 45, 250 30 S295 12, 320 18" fill="none" stroke="#2dd4bf" stroke-width="3" />
              </svg>
            </div>
          </div>
        </section>

        <aside class="panel">
          <h3 style="margin-top: 0;">Riwayat Transaksi</h3>
          <div class="toolbar">
            <div class="search-box">
              <input id="searchInput" type="text" placeholder="Cari transaksi" />
              <select id="categoryFilter">
                <option value="all">Semua Kategori</option>
                <option value="Makanan">Makanan</option>
                <option value="Investasi">Investasi</option>
                <option value="Transportasi">Transportasi</option>
                <option value="Tagihan">Tagihan</option>
                <option value="Gaji">Gaji</option>
              </select>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Nama</th>
                  <th>Kategori</th>
                  <th>Jumlah</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="transactionTable"></tbody>
            </table>
          </div>
        </aside>
      </main>
    </div>

    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <h3>Tambah Transaksi</h3>
        <form id="transactionForm" class="modal-body">
          <input id="name" name="name" type="text" placeholder="Nama transaksi" required />
          <input id="amount" name="amount" type="number" placeholder="Nominal" min="1" required />
          <select id="category" name="category" required>
            <option value="">Pilih kategori</option>
            <option value="Makanan">Makanan</option>
            <option value="Investasi">Investasi</option>
            <option value="Transportasi">Transportasi</option>
            <option value="Tagihan">Tagihan</option>
            <option value="Gaji">Gaji</option>
          </select>
          <select id="type" name="type" required>
            <option value="expense">Pengeluaran</option>
            <option value="income">Pemasukan</option>
          </select>
          <div class="modal-actions">
            <button class="btn" type="button" id="cancelModal">Batal</button>
            <button class="btn btn-primary" type="submit" id="submitBtn">Simpan</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      const initialTransactions = [
        { id: 1, name: 'Gaji Bulan Juni', amount: 9000000, category: 'Gaji', type: 'income' },
        { id: 2, name: 'Makan Siang', amount: 45000, category: 'Makanan', type: 'expense' },
        { id: 3, name: 'Beli ETF', amount: 500000, category: 'Investasi', type: 'expense' }
      ];

      let transactions = [...initialTransactions];
      const transactionTable = document.getElementById('transactionTable');
      const searchInput = document.getElementById('searchInput');
      const categoryFilter = document.getElementById('categoryFilter');
      const modalOverlay = document.getElementById('modalOverlay');
      const form = document.getElementById('transactionForm');
      const submitBtn = document.getElementById('submitBtn');

      function formatCurrency(value) {
        return new Intl.NumberFormat('id-ID', {
          style: 'currency',
          currency: 'IDR',
          maximumFractionDigits: 0
        }).format(value);
      }

      function getVisibleTransactions() {
        const query = searchInput.value.toLowerCase();
        const selectedCategory = categoryFilter.value;

        return transactions.filter((item) => {
          const matchesQuery = item.name.toLowerCase().includes(query);
          const matchesCategory = selectedCategory === 'all' || item.category === selectedCategory;
          return matchesQuery && matchesCategory;
        });
      }

      function renderTransactions() {
        const visible = getVisibleTransactions();
        if (visible.length === 0) {
          transactionTable.innerHTML = '<tr><td colspan="4" class="empty-state">Tidak ada transaksi yang cocok.</td></tr>';
          return;
        }

        transactionTable.innerHTML = visible.map((item) => `
          <tr>
            <td>${item.name}</td>
            <td>${item.category}</td>
            <td><span class="tag ${item.type === 'income' ? 'income' : 'expense'}">${item.type === 'income' ? '+' : '-'} ${formatCurrency(item.amount)}</span></td>
            <td><button class="delete-btn" data-id="${item.id}">Hapus</button></td>
          </tr>
        `).join('');
      }

      function updateSummary() {
        const income = transactions.filter((item) => item.type === 'income').reduce((sum, item) => sum + item.amount, 0);
        const expense = transactions.filter((item) => item.type === 'expense').reduce((sum, item) => sum + item.amount, 0);
        const balance = income - expense;

        document.getElementById('incomeValue').textContent = formatCurrency(income);
        document.getElementById('expenseValue').textContent = formatCurrency(expense);
        document.getElementById('balanceValue').textContent = formatCurrency(balance);
      }

      document.getElementById('openModal').addEventListener('click', () => {
        modalOverlay.classList.add('active');
        form.reset();
        document.getElementById('type').value = 'expense';
      });

      document.getElementById('cancelModal').addEventListener('click', () => {
        modalOverlay.classList.remove('active');
      });

      modalOverlay.addEventListener('click', (event) => {
        if (event.target === modalOverlay) modalOverlay.classList.remove('active');
      });

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        const name = document.getElementById('name').value.trim();
        const amount = Number(document.getElementById('amount').value);
        const category = document.getElementById('category').value;
        const type = document.getElementById('type').value;

        if (!name || !amount || !category) {
          alert('Mohon isi nama, nominal, dan kategori transaksi.');
          return;
        }

        transactions.unshift({
          id: Date.now(),
          name,
          amount,
          category,
          type
        });

        form.reset();
        modalOverlay.classList.remove('active');
        updateSummary();
        renderTransactions();
      });

      transactionTable.addEventListener('click', (event) => {
        const button = event.target.closest('button[data-id]');
        if (!button) return;

        const id = Number(button.dataset.id);
        transactions = transactions.filter((item) => item.id !== id);
        updateSummary();
        renderTransactions();
      });

      [searchInput, categoryFilter].forEach((element) => {
        element.addEventListener('input', renderTransactions);
        element.addEventListener('change', renderTransactions);
      });

      function validateFormState() {
        const name = document.getElementById('name').value.trim();
        const amount = document.getElementById('amount').value;
        const category = document.getElementById('category').value;
        submitBtn.disabled = !name || !amount || !category;
        submitBtn.style.opacity = submitBtn.disabled ? '0.6' : '1';
      }

      ['name', 'amount', 'category'].forEach((id) => {
        document.getElementById(id).addEventListener('input', validateFormState);
        document.getElementById(id).addEventListener('change', validateFormState);
      });

      validateFormState();
      updateSummary();
      renderTransactions();
    </script>
  </body>
</html>
